services:
  credit-ingest:
    build: .
    container_name: credit-ingest-${CREDIT_INSTANCE:-local}
    restart: unless-stopped
    ports:
      - "${INGEST_HOST_PORT:-8080}:8080"
    volumes:
      - ./keys:/etc/credit/keys:ro
    environment:
      # Use ${VAR} substitution so .env supplies real values. Hardcoding a literal
      # like "<your-snowflake-account>" silently passes the placeholder through
      # to the HPA SDK, which then fails JWT auth with a confusing error.
      SNOWFLAKE_ACCOUNT: "${SNOWFLAKE_ACCOUNT:-<set-via-env-SNOWFLAKE_ACCOUNT>}"
      SNOWFLAKE_USER: "CREDIT_INGEST_USR"
      SNOWFLAKE_ROLE: "CREDIT_INGEST_RL"
      SNOWFLAKE_DATABASE: "SNOWFLAKE_EXAMPLE"
      SNOWFLAKE_SCHEMA: "CREDIT_DEMO"
      SNOWFLAKE_TABLE: "RAW_EVENTS"
      # Strategy-2 pre-agg write-through target (second interactive table).
      SNOWFLAKE_BOOK_TABLE: "POSITION_BOOK"
      SNOWFLAKE_PRIVATE_KEY_PATH: "/etc/credit/keys/credit_ingest.p8"
      PARTITION_COUNT: "4"
      INGEST_API_KEY: "${INGEST_API_KEY:-<set-via-env-INGEST_API_KEY>}"
      OTEL_SERVICE_NAME: "credit-ingest"
      # Empty by default (OTEL disabled) — set when running the optional
      # observe-agent sidecar (`--profile observe`).
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  observe-agent:
    image: observeinc/observe-agent:2.0.0
    container_name: credit-observe-agent-${CREDIT_INSTANCE:-local}
    restart: unless-stopped
    # Optional OpenTelemetry → Observe.inc sidecar. Opt-in only: needs a
    # generated observe-agent.yaml (from observe-agent.yaml.tpl + Observe tokens).
    # NOT started by the local quickstart (`--profile quick`); enable with
    # `--profile observe` once you've created observe-agent.yaml.
    profiles: [observe]
    volumes:
      - ./observe-agent.yaml:/etc/observe-agent/observe-agent.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Cloudflare Tunnel — routes public HTTPS to credit-ingest:8080.
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env (grab from Cloudflare Zero Trust dashboard).
  # Remove this service if you run cloudflared on the host instead (Path 2).
  cloudflared:
    image: cloudflare/cloudflared:2025.7.0
    container_name: credit-cloudflared-${CREDIT_INSTANCE:-local}
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      credit-ingest:
        condition: service_healthy
    networks: [default]
    profiles: [tunnel]

  # Quick-tunnel — ephemeral *.trycloudflare.com URL, no Cloudflare account needed.
  # Run with: docker compose --profile quick up
  # Then check logs: docker compose logs cloudflared-quick | grep trycloudflare
  # Each restart yields a NEW random URL (tunnel is anonymous + ephemeral).
  cloudflared-quick:
    image: cloudflare/cloudflared:2025.7.0
    container_name: credit-cloudflared-quick-${CREDIT_INSTANCE:-local}
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 --url http://credit-ingest:8080
    depends_on:
      credit-ingest:
        condition: service_healthy
    networks: [default]
    profiles: [quick]
